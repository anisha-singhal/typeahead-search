<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Search Typeahead</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="badge">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </div>
      <h1>Search Typeahead</h1>
      <p class="tagline">Start typing for instant suggestions. Submit a search to record it.</p>
    </header>

    <div class="controls">
      <div class="segmented" role="tablist" aria-label="Ranking mode">
        <button class="seg active" data-mode="basic" role="tab" aria-selected="true">Popularity</button>
        <button class="seg" data-mode="trending" role="tab" aria-selected="false">Trending</button>
      </div>
    </div>

    <form id="search-form" class="search" autocomplete="off">
      <span class="search-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      </span>
      <input id="search-input" type="text" placeholder="Search for anything…" aria-label="Search" aria-autocomplete="list" />
      <button type="submit" class="go">Search</button>
      <ul id="suggestions" class="suggestions" role="listbox"></ul>
    </form>

    <div id="status" class="status" role="status"></div>
    <div id="response" class="response"></div>

    <section class="card trending-card">
      <div class="card-head">
        <h2>Trending searches</h2>
        <span class="live"><span class="pulse"></span>live</span>
      </div>
      <ol id="trending-list" class="trending-list"></ol>
    </section>

    <section class="stats" id="stats" aria-label="System stats"></section>

    <footer class="endpoints">
      <code>GET /suggest</code>
      <code>POST /search</code>
      <code>GET /trending</code>
      <code>GET /cache/debug</code>
      <code>GET /stats</code>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
